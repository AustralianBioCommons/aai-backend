name: Build And Push Backend Release Image Manual

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build and push, for example v1.0.1
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  IMAGE_REPO: ${{ secrets.AWS_ECR_IMAGE_REPO }}

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Validate required secrets
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ECR_IMAGE_REPO: ${{ secrets.AWS_ECR_IMAGE_REPO }}
          AWS_ROLE_ECR_PUSH: ${{ secrets.AWS_ROLE_ECR_PUSH }}
        run: |
          set -euo pipefail
          if [ -z "${AWS_REGION}" ]; then
            echo "Missing required secret AWS_REGION" >&2
            exit 1
          fi
          if [ -z "${AWS_ECR_IMAGE_REPO}" ]; then
            echo "Missing required secret AWS_ECR_IMAGE_REPO" >&2
            exit 1
          fi
          if [ -z "${AWS_ROLE_ECR_PUSH}" ]; then
            echo "Missing required secret AWS_ROLE_ECR_PUSH" >&2
            exit 1
          fi

      - uses: docker/setup-buildx-action@v3

      # Authenticate to AWS
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ECR_PUSH }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push (release)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_REPO }}:${{ inputs.tag }}
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
